<body class="locked">

<div class="gate no-print">
  <div class="gate-brand">TH <span>REPUBLIC</span></div>
  <div class="gate-title">Acceso a la propuesta</div>
  <form class="gate-form" id="gate-form" autocomplete="off">
    <input class="gate-input" id="gate-input" type="password" maxlength="4" placeholder="····" inputmode="latin" required>
    <button class="gate-submit" type="submit">Ingresar</button>
  </form>
  <div class="gate-error" id="gate-error"></div>
</div>

<script>
  (function(){
    var CODE = "cv31";
    var body = document.body;
    var form = document.getElementById('gate-form');
    var input = document.getElementById('gate-input');
    var error = document.getElementById('gate-error');

    if (sessionStorage.getItem('colviva-unlocked') === '1') {
      body.classList.remove('locked');
    }

    form.addEventListener('submit', function(e){
      e.preventDefault();
      if (input.value.trim().toLowerCase() === CODE) {
        sessionStorage.setItem('colviva-unlocked', '1');
        body.classList.remove('locked');
        error.textContent = '';
      } else {
        error.textContent = 'Código incorrecto';
        input.value = '';
        input.focus();
      }
    });
  })();
</script>
